<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TETRIS 99 - Debug</title></head>
<body style="background:#000;color:#0f0;font:14px monospace;padding:20px">
<pre id="log"></pre>
<script>
const log = el = document.getElementById('log');
const L = msg => { log.textContent += msg + '\n'; console.log(msg); };
L('=== TETRIS 99 Debug Test ===');
L('');

// Test 1: Load game.js
try {
    L('[1] Loading game.js...');
    const s = document.createElement('script');
    s.src = 'js/game.js';
    s.onload = () => L('[1] Ôťô game.js loaded');
    s.onerror = e => L('[1] ÔťŚ FAILED to load game.js: ' + e);
    document.head.appendChild(s);
} catch(e) {
    L('[1] ÔťŚ Script load error: ' + e.message);
}

// Test 2: Wait and check classes
setTimeout(() => {
    L('');
    L('[2] Checking classes...');
    const classes = ['Engine','AI','Battle','Renderer','OpponentsView','Game'];
    classes.forEach(c => {
        L('  ' + c + ': ' + (typeof window[c] !== 'undefined' ? 'Ôťô' : 'ÔťŚ MISSING'));
    });

    // Test 3: Engine test
    L('');
    L('[3] Engine test...');
    try {
        const eng = new Engine();
        L('  Created: Ôťô');
        L('  Board: ' + eng.board.length + 'x' + eng.board[0].length);
        L('  Current piece: ' + (eng.cur ? eng.cur.type : 'null'));
        L('  Next piece: ' + (eng.next ? eng.next.type : 'null'));
        L('  Game over: ' + eng.gameOver);

        // Test move
        const moved = eng.move(1, 0);
        L('  Move right: ' + moved);

        // Test rotate
        const rotated = eng.rotate(1);
        L('  Rotate: ' + rotated);

        // Test hard drop
        const drop = eng.hardDrop();
        L('  Hard drop: ' + drop + ' rows');
        L('  Score: ' + eng.score);
        L('  Game over after drop: ' + eng.gameOver);
        L('  Ôťô Engine works!');
    } catch(e) {
        L('  ÔťŚ Engine error: ' + e.message + '\n' + e.stack);
    }

    // Test 4: DOM check
    L('');
    L('[4] DOM elements...');
    const ids = ['gameCanvas','nextCanvas','holdCanvas','overlay','startBtn','stat-rank','stat-ko','stat-score','comboDisplay','attackQueue','opponentsGrid'];
    ids.forEach(id => {
        const el = document.getElementById(id);
        L('  #' + id + ': ' + (el ? 'Ôťô ' + el.tagName : 'ÔťŚ MISSING'));
    });

    // Test 5: Game instance
    L('');
    L('[5] Game instance...');
    try {
        if (window.game) {
            L('  window.game exists: Ôťô');
            L('  Running: ' + window.game.running);
            L('  Battle started: ' + window.game.battle.started);
        } else {
            L('  window.game: ÔťŚ MISSING');
        }
    } catch(e) {
        L('  ÔťŚ Game error: ' + e.message);
    }

    L('');
    L('=== Test complete ===');
}, 1000);
</script>
</body>
</html>
